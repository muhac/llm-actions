# action.yml
name: "LLM in GitHub Actions"
description: "Run an LLM model on a vLLM server inside your CI pipeline."

author: "Muhan Li"
branding:
  icon: "message-square"
  color: "red"

###############
# Inputs & Outputs
###############
inputs:
  model:
    description: "Model name"
    required: false
    default: "Qwen/Qwen3-1.7B"
  vllm_version:
    description: "vLLM version tag (e.g. v0.17.0)"
    required: false
    default: "v0.17.0"
  hf_token:
    description: "Hugging Face access token"
    required: false

outputs:
  logs:
    description: "vLLM server logs"
    value: ${{ steps.show_logs.outputs.log }}

################
# Run the Action
################

runs:
  using: "composite"

  steps:
    #########################################
    # 1. Pull vLLM Docker image
    #########################################

    - name: Pull vLLM image
      shell: bash
      run: |
        mkdir -p ../.llm-actions
        docker pull vllm/vllm-openai-cpu:${{ inputs.vllm_version }}-x86_64

    #########################################
    # 2. Run vLLM server
    #########################################

    - name: Run vLLM server
      shell: bash
      env:
        HF_TOKEN: ${{ inputs.hf_token }}
      run: |
        docker run -d --name vllm-server \
          -v ~/.cache/huggingface:/root/.cache/huggingface \
          -p 8000:8000 \
          --env "HF_TOKEN=${HF_TOKEN}" \
          vllm/vllm-openai-cpu:${{ inputs.vllm_version }}-x86_64 \
          --model "${{ inputs.model }}"
        docker logs -f vllm-server >> ../.llm-actions/vllm.log 2>&1 &

    #########################################
    # 3. Error handling: max seq len exceeded
    #########################################

    - name: Check server status
      id: check_server
      shell: bash
      run: |
        status="timeout"
        for i in {1..30}; do
          if curl -sSf http://localhost:8000/v1/models > /dev/null; then
            status="ready"
            break
          fi
          if grep -q "ValueError: The model's max seq len" ../.llm-actions/vllm.log; then
            status="maxlen"
            break
          fi
          sleep 10
        done
        echo "status=$status" >> "$GITHUB_OUTPUT"
        echo "Server status: $status"

    - name: Retry if max seq len exceeded
      if: steps.check_server.outputs.status == 'maxlen'
      shell: bash
      env:
        HF_TOKEN: ${{ inputs.hf_token }}
      run: |
        docker stop vllm-server || true
        docker rm vllm-server || true
        len=$(grep -m1 -oP "tokens that can be stored in KV cache \\(\\K[0-9]+" ../.llm-actions/vllm.log)
        docker run -d --name vllm-server \
          -v ~/.cache/huggingface:/root/.cache/huggingface \
          -p 8000:8000 \
          --env "HF_TOKEN=${HF_TOKEN}" \
          vllm/vllm-openai-cpu:${{ inputs.vllm_version }}-x86_64 \
          --model "${{ inputs.model }}" \
          --max-model-len "$len"
        docker logs -f vllm-server >> ../.llm-actions/vllm.log 2>&1 &

    #########################################
    # 4. Wait for server to be ready
    #########################################

    - name: Wait until ready (30 min max)
      shell: bash
      run: |
        for i in {1..360}; do
          if curl -sSf http://localhost:8000/v1/models > /dev/null; then
            echo "vLLM server is ready"; exit 0
          fi
          if ! docker inspect -f '{{.State.Running}}' vllm-server 2>/dev/null | grep -q "true"; then
            echo "vLLM server container exited unexpectedly"
            cat ../.llm-actions/vllm.log && exit 1
          fi
          sleep 5
        done
        echo "Timeout: server not ready in 30 min"
        cat ../.llm-actions/vllm.log && exit 1

    #########################################
    # 5. Show logs
    #########################################

    - name: Show logs
      id: show_logs
      shell: bash
      run: |
        cat ../.llm-actions/vllm.log
        echo "log<<EOF"              >> "$GITHUB_OUTPUT"
        cat ../.llm-actions/vllm.log >> "$GITHUB_OUTPUT"
        echo "EOF"                   >> "$GITHUB_OUTPUT"
