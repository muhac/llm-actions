name: Run LLMs

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  code:
    name: Run Python Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        model:
          [
            "Qwen/Qwen3-1.7B",
            "google/gemma-2-2b-it",
            "Qwen/Qwen2.5-3B-Instruct",
            "meta-llama/Llama-3.2-3B-Instruct",
            "microsoft/Phi-4-mini-instruct",
          # "Qwen/Qwen3-4B",
            "Qwen/Qwen3-14B-AWQ",
          ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
          swap-storage: false

      - name: Pull docker image
        run: docker pull muhac/jupyter-pytorch:env-2502a

      - name: Test the environment
        run: |
          tree
          docker run -v ./:/srv \
          muhac/jupyter-pytorch:env-2502a \
          bash -i -c "ls -lh /srv"

      - name: Start Docker Container
        run: |
          docker run -d --name container -v ./:/srv \
          -e HF_TOKEN="${{ secrets.HF }}" \
          muhac/jupyter-pytorch:env-2502a tail -f /dev/null

      - name: Run LLM
        run: |
          docker exec container bash -i -c "python /srv/huggingface.py ${{ matrix.model }} \
          'How many times does the letter R appear in the word strawberry?' \
          '陨石为什么每次都能精准砸到陨石坑？' \
          "

      - name: Show results
        run: cat response.txt

      - name: Stop Docker Container
        run: |
          docker stop container
          docker rm container

  vllm:
    name: Hosted by vLLM
    runs-on: ubuntu-latest
    strategy:
      matrix:
        model:
          [
            "Qwen/Qwen3-1.7B",
            "google/gemma-2-2b-it",
            "Qwen/Qwen2.5-3B-Instruct",
            "Qwen/Qwen3-4B",
          ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
          swap-storage: false

      - name: Pull vLLM image
        run: docker pull vllm/vllm-openai-cpu:v0.17.0-x86_64

      - name: Run vLLM server
        env:
          HF_TOKEN: ${{ secrets.HF }}
        run: |
          docker run -d --name vllm-server \
            -v ~/.cache/huggingface:/root/.cache/huggingface \
            -p 8000:8000 \
            --env "HF_TOKEN=${HF_TOKEN}" \
            vllm/vllm-openai-cpu:v0.17.0-x86_64 \
            --model "${{ matrix.model }}"
          docker logs -f vllm-server > vllm.log 2>&1 &

      - name: Check server status
        id: check_server
        run: |
          for i in {1..30}; do
              if curl -sSf http://localhost:8000/v1/models > /dev/null; then
                exit 0  # Server started
              fi
              if grep -q "ValueError: The model's max seq len" vllm.log; then
                exit 1  # Error detected
              fi
              sleep 10
          done
          cat vllm.log
        continue-on-error: true

      - name: Fix max seq len issue
        if: steps.check_server.outcome != 'success'
        id: check_maxlen
        run: |
          allowed_len=$(grep -m1 -oP "tokens that can be stored in KV cache \\(\\K[0-9]+" vllm.log)
          echo "Max sequence length issue detected, retrying with allowed length: $allowed_len"
          echo "allowed_len=$allowed_len" >> "$GITHUB_OUTPUT"

      - name: Run models (retry)
        if: steps.check_server.outcome != 'success'
        env:
          HF_TOKEN: ${{ secrets.HF }}
        run: |
          docker stop vllm-server || true
          docker rm vllm-server || true
          docker run -d --name vllm-server \
            -v ~/.cache/huggingface:/root/.cache/huggingface \
            -p 8000:8000 \
            --env "HF_TOKEN=${HF_TOKEN}" \
            vllm/vllm-openai-cpu:v0.17.0-x86_64 \
            --model "${{ matrix.model }}" \
            --max-model-len ${{ steps.check_maxlen.outputs.allowed_len }}
          docker logs -f vllm-server >> vllm.log 2>&1 &

      - name: Wait for server to be ready
        run: |
          for i in {1..360}; do
              if curl -sSf http://localhost:8000/v1/models > /dev/null; then
                  echo "vLLM server is ready"; exit 0
              fi
              if ! docker inspect -f '{{.State.Running}}' vllm-server 2>/dev/null | grep -q "true"; then
                  echo "vLLM server container exited unexpectedly"
                  cat vllm.log && exit 1
              fi
              sleep 5
          done
          echo "Timeout: server not ready in 30 min" && exit 1

      - name: Show logs
        run: cat vllm.log

      - name: Test the server
        run: curl --retry 5 --retry-delay 10 http://localhost:8000/v1/models

      - name: Demo chat
        run: |
          curl http://localhost:8000/v1/chat/completions \
          -o response.json \
          -H "Content-Type: application/json" \
          -d '{
              "model": "${{ matrix.model }}",
              "messages": [
                  {"role": "system", "content": "You are a teacher."},
                  {"role": "user", "content": "How many times does the letter R appear in the word strawberry?"}
              ]
          }'

      - name: Show response
        run: cat response.json | jq . || cat response.json

      - name: Demo chat (Chinese)
        run: |
          curl http://localhost:8000/v1/chat/completions \
          -o response.json \
          -H "Content-Type: application/json" \
          -d '{
              "model": "${{ matrix.model }}",
              "messages": [
                  {"role": "user", "content": "陨石为什么每次都能精准砸到陨石坑？"}
              ]
          }'

      - name: Show response
        run: cat response.json | jq . || cat response.json
