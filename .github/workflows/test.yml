name: LLM smoke test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  infer:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        model:
          [
            "Qwen/Qwen2.5-1.5B-Instruct",
            "Qwen/Qwen2.5-VL-3B-Instruct",
            "Qwen/Qwen3-1.7B",
            "Qwen/Qwen3-4B",
            "Qwen/Qwen3-8B-AWQ",
          ]

    steps:
      - uses: actions/checkout@v4

      - name: Run LLM inference
        id: run_llm
        uses: ./
        with:
          model: ${{ matrix.model }}

      - name: Show vLLM logs
        run: echo "${{ steps.run_llm.outputs.logs }}"

      - name: List files
        run: tree -a -L 3 ..

      - name: Test the server
        run: curl --retry 5 --retry-delay 10 http://localhost:8000/v1/models

      - name: Demo chat
        run: |
          curl http://localhost:8000/v1/chat/completions \
          -o response.json \
          -H "Content-Type: application/json" \
          -d '{
              "model": "${{ matrix.model }}",
              "messages": [
                  {"role": "system", "content": "You are a teacher."},
                  {"role": "user", "content": "How many times does the letter R appear in the word strawberry?"}
              ]
          }'

      - name: Show response
        run: cat response.json | jq . || cat response.json

      - name: Demo chat (Chinese)
        run: |
          curl http://localhost:8000/v1/chat/completions \
          -o response.json \
          -H "Content-Type: application/json" \
          -d '{
              "model": "${{ matrix.model }}",
              "messages": [
                  {"role": "user", "content": "陨石为什么每次都能精准砸到陨石坑？"}
              ]
          }'

      - name: Show response
        run: cat response.json | jq . || cat response.json

      - name: Demo chat (no_think)
        run: |
          curl http://localhost:8000/v1/chat/completions \
          -o response.json \
          -H "Content-Type: application/json" \
          -d '{
              "model": "${{ matrix.model }}",
              "messages": [
                  {"role": "system", "content": "/no_think"},
                  {"role": "user", "content": "How many times does the letter R appear in the word strawberry?"}
              ]
          }'

      - name: Show response
        run: cat response.json | jq . || cat response.json

      - name: Demo chat (image)
        continue-on-error: true
        run: |
          curl http://localhost:8000/v1/chat/completions \
          -o response.json \
          -H "Content-Type: application/json" \
          -d '{
              "model": "${{ matrix.model }}",
              "messages": [
                  {
                      "role": "user",
                      "content": [
                          {"type": "image_url", "image_url": {"url": "https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen-VL/assets/demo.jpeg"}},
                          {"type": "text", "text": "Describe this image."}
                      ]
                  }
              ]
          }'

      - name: Show response
        run: cat response.json | jq . || cat response.json

    - name: Show logs
      id: show_logs
      shell: bash
      run: |
        cat ../.llm-actions/vllm.log
        echo "log<<EOF"              >> "$GITHUB_OUTPUT"
        cat ../.llm-actions/vllm.log >> "$GITHUB_OUTPUT"
        echo "EOF"                   >> "$GITHUB_OUTPUT"
